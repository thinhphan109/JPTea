<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background gradient (sakura pink → teal) -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fda4af"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <radialGradient id="petal" cx="0.3" cy="0.3" r="0.8">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#fbcfe8"/>
    </radialGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Sakura petal in center -->
  <g transform="translate(32 32)">
    <!-- 5 petals rotated around center -->
    <g fill="url(#petal)" stroke="#ec4899" stroke-width="0.6" opacity="0.95">
      <ellipse cx="0" cy="-12" rx="6" ry="9"/>
      <ellipse cx="0" cy="-12" rx="6" ry="9" transform="rotate(72)"/>
      <ellipse cx="0" cy="-12" rx="6" ry="9" transform="rotate(144)"/>
      <ellipse cx="0" cy="-12" rx="6" ry="9" transform="rotate(216)"/>
      <ellipse cx="0" cy="-12" rx="6" ry="9" transform="rotate(288)"/>
    </g>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="3" fill="#fbbf24"/>
  </g>
</svg>
